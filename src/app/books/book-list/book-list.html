<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 bg-gray-100 min-h-screen">
  <div class="mb-6 text-center">
    <h1 class="text-4xl text-gray-800 tracking-tight">Rechercher un livre</h1>
  </div>

  <app-search (searchEvent)="onSearch($event)"></app-search>

  @if (isLoading) {
    <app-loader message="Recherche des livres en cours..."></app-loader>
  } @else if (errorMessage) {
    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
      <p class="text-sm text-red-700">{{ errorMessage }}</p>
    </div>
  } @else if (books.length === 0) {
    <div class="text-center py-16 px-4">
      <h3 class="mt-2 text-sm font-medium text-gray-900">Aucun livre trouvé</h3>
    </div>
  } @else {
    <div class="mb-4 text-xs flex items-center text-gray-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
      </svg>
      <span>Page {{ currentPage }} / {{ totalPages }}</span>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (book of books; track book.key) {
        <app-book-item [book]="book"></app-book-item>
      }
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" (pageChange)="onPageChange($event)"></app-pagination>
  }
</div>
