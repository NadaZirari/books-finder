<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8 transition-default hover:shadow-md">
  <form [formGroup]="searchForm" (ngSubmit)="onSubmit()">
    <div class="flex flex-col md:flex-row gap-4">
      <div class="flex-grow">
        <label for="query" class="sr-only">Mots-clés (Titre ou Auteur)</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
            </svg>
          </div>
          <input type="text" id="query" formControlName="query" class="block w-full pl-11 pr-4 py-3 bg-gray-50 border-transparent focus:bg-white border focus:border-indigo-500 focus:ring-0 rounded-xl text-sm transition-default" placeholder="Rechercher par titre, auteur...">
        </div>
      </div>
      
      <div class="md:w-64">
        <label for="subject" class="sr-only">Thème / Genre</label>
        <select id="subject" formControlName="subject" class="block w-full py-3 px-4 bg-gray-50 border-transparent focus:bg-white border focus:border-indigo-500 focus:ring-0 rounded-xl text-sm transition-default text-gray-700">
          <option value="">Tous les thèmes</option>
          @for (sub of subjects; track sub) {
            <option [value]="sub">{{ sub }}</option>
          }
        </select>
      </div>

      <button type="submit" class="flex-shrink-0 inline-flex items-center justify-center px-6 py-3 border border-transparent text-sm font-medium rounded-xl shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-default">
        Rechercher
      </button>
    </div>
  </form>
</div>
