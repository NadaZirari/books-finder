<div class="flex justify-center mb-10">
  <form [formGroup]="searchForm" (ngSubmit)="onSubmit()"
    class="w-full max-w-4xl flex flex-col md:flex-row gap-4 items-center">

    <!-- Input -->
    <div class="flex-grow w-full md:w-auto relative">
      <input type="text" formControlName="query"
        class="block w-full px-4 py-2 border-2 border-blue-200 focus:border-blue-500 rounded-md focus:outline-none bg-gray-50 shadow-inner"
        placeholder="harry">
    </div>

    <!-- Select -->
    <div class="w-full md:w-64">
      <select formControlName="subject"
        class="block w-full px-4 py-2 border border-gray-300 focus:border-blue-500 rounded-md focus:outline-none bg-gray-100 text-gray-700">
        <option value="">Tous les thèmes</option>
        @for (sub of subjects; track sub) {
        <option [value]="sub">{{ sub }}</option>
        }
      </select>
    </div>

    <!-- Button -->
    <button type="submit"
      class="w-full md:w-auto flex-shrink-0 inline-flex items-center justify-center px-6 py-2 border border-blue-600 rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none">
      <svg class="h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
          clip-rule="evenodd" />
      </svg>
      Rechercher
    </button>

  </form>
</div>
