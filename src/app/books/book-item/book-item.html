<div class="bg-white rounded-lg shadow-sm flex flex-col h-full border border-gray-100 overflow-hidden relative">
  <!-- Image container -->
  <div class="flex justify-center bg-gray-50 p-4 min-h-[300px]">
    <img [src]="coverUrl" [alt]="'Couverture de ' + book.title" class="max-h-64 object-contain shadow-sm" loading="lazy" (error)="$event.target.src='assets/no-cover.jpg'">
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col flex-grow bg-white">
    <div class="flex-grow">
      <h3 class="font-bold text-gray-800 text-lg leading-snug mb-1 line-clamp-2" [title]="book.title">
        {{ book.title }}
      </h3>
      <p class="text-sm text-gray-500 mb-3 line-clamp-1">
        {{ book.authorName ? book.authorName.join(', ') : 'Auteur inconnu' }}
      </p>
      
      <div class="flex items-center gap-1 text-sm text-gray-500 mb-6">
        @if (book.firstPublishYear) {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span>{{ book.firstPublishYear }}</span>
        }
      </div>
    </div>
    
    <button [routerLink]="['/books/detail', bookId]" class="mt-auto w-full py-2 border border-blue-500 text-blue-500 hover:bg-blue-50 font-medium text-sm rounded bg-white transition-colors">
      Voir le détail
    </button>
  </div>
</div>
