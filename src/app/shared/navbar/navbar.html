<nav class="bg-gray-100 border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex items-center">
        <a routerLink="/books" class="flex-shrink-0 flex items-center">
          <span class="font-bold text-xl text-blue-600 tracking-tight">BooksFinder</span>
        </a>
      </div>

      <div class="flex items-center space-x-6">
        <a routerLink="/books" class="text-sm font-medium text-gray-600 hover:text-gray-900">

        </a>

          <a routerLink="/favorites" class="text-sm font-medium text-gray-600 hover:text-gray-900">

          </a>
          <button (click)="logout()" class="px-4 py-2 border border-transparent rounded shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">

          </button>
        } @else {
          <a routerLink="/auth/login" class="px-4 py-2 border border-transparent rounded shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
            Connexion
          </a>
        }
      </div>
    </div>
  </div>
